name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install chromadb sentence-transformers pandas transformers torch

      - name: Run ingestion (build vector DB)
        run: |
          python scripts/ingest_csv_to_chroma.py

      - name: Run eval suite
        run: |
          python -m scripts.eval_offline